<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Place Name Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', path='styles.css')}}">
    <meta property="og:title" content="{{type2}}: The Place Name Game" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://the.piggypiggyyoinkyoink.website" />
    <meta property="og:image" content="{{url_for('static', path='image.png')}}" />
    <meta property="og:description" content="How many place names do you know in {{type}}? &#x0A; Play now to find out!" />
    <meta property="og:site_name" content="The Place Name Game" />
</head>
<body>
    <div class = "loading" id = "loading">
        <img src="{{url_for('static', path='loading_map.gif')}}" alt="Loading..." style = "width: 50%;">
        <h2 id = "loadingText">Loading</h2>
    </div>
    <div id = "main" style = "display: none;">
        <div class = "top">
            <h1 id = "h1">Loading...</h1>
            <p id = "instructions"><a href = "{{url_for('home')}}">Back to Home</a></p>
            <hr>
        </div>
        <div class = "container">
            <div class = "row">
                <div class = "col-lg-auto c" id="l">
                    <!-- <h3>Map</h3> -->
                    <svg id="map" width="600" height="750"></svg><br>
                </div>
                <div class = "col-lg-4 c" id="r">
                    <!-- <h3>Enter Place Names</h3> -->
                    <br>
                    <div class="input-group mb-3" id = "placeInputGroup">
                        <input type="text" class = "form-control" id="placeInput" placeholder="Enter a place name" autocomplete="off">
                        <div class="input-group-append">
                            <button class="btn btn-secondary" type="button" id="placeSubmitButton">Submit</button>
                        </div>
                    </div>

                    <br>
                    <p id="message">⠀</p>
                    <br>
                    <h3 id = "placesHeader">Places Entered</h3>
                    <table class = "table table-striped" id = "placesTableHeader">
                        <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Place</th>
                            </tr>
                        </thead>
                    </table>
                    <div id = "tableContainer">
                        <table class = "table table-striped" id = "placesTable">
                            <thead>
                                <tr>
                                    
                                </tr>
                            </thead>
                        </table>
                    </div>
                    <br>
                    <div class = "btncontainer">
                        <div class = "inputcontainer" style="display:inline-block; padding-bottom:5px;">
                            <input type="text" class = "form-control" id="nameInput" placeholder="Enter your name...">
                        </div>
                        <div class = "buttonscontainer" style="display:inline-block; transform: translateY(-2px);">
                            <button type="button" class="btn btn-success" id="finishButton">Finish</button>
                            <button type="button" class="btn btn-danger" id="resetButton">Reset</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="{{url_for('static', path='index.js')}}"></script>
</body>
</html>
