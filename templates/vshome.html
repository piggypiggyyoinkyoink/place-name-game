<html>
    <head>
        <title>The Place Name Game</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <link rel="stylesheet" href="{{url_for('static', path='styles.css')}}">
        <script src="https://kit.fontawesome.com/36ea985757.js" crossorigin="anonymous"></script>

        <meta property="og:title" content="The Place Name Game: Home" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://the.piggypiggyyoinkyoink.website" />
        <meta property="og:image" content="{{url_for('static', path='image.png')}}" />
        <meta property="og:description" content="How many place names do you know? &#x0A; Select a region to play!" />
        <meta property="og:site_name" content="The Place Name Game" />
        <link rel="icon" type="image/png" href="./static/piggy.png">
    </head>
    <body>
        <div class = "top">
            <h1 id = "h1">The Place Name Game</h1>
            <p style = "font-size: 1.25rem">How many place names do you know? Select a region to play!</p>
            <hr>
        </div>
        <div class = "loading" id = "loading">
            <img src="{{url_for('static', path='loading_map.gif')}}" alt="Loading..." style = "width: 50%;">
            <h2 id = "loadingText">Loading</h2>
        </div>
        <div class = "container" id = "main" style = "display: none;">
            <h3>Main Regions</h3>
            <hr>
            <div class = "row justify-content-center g-3" id = "country-card-container"></div><br><br>
            <h3>Counties of England</h3><hr>
            <div class = "row justify-content-center g-3" id = "england-card-container"></div><br><br>
            <h3>Council Areas of Scotland</h3><hr>
            <div class = "row justify-content-center g-3" id = "scotland-card-container"></div><br><br>
            <h3>Principal Areas of Wales</h3><hr>
            <div class = "row justify-content-center g-3" id = "wales-card-container"></div><br><br>
            <h3>Counties of Northern Ireland</h3><hr>
            <div class = "row justify-content-center g-3" id = "ni-card-container"></div>
        </div><br><br>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
        <script src="{{url_for('static', path='vshome.js')}}"></script>
    </body>
</html>
